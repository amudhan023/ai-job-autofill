name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension:
    name: Extension (typecheck · unit · build · e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + component tests (coverage)
        run: npm run test:coverage

      - name: Build extension
        run: npm run build

      - name: Package extension (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: node scripts/package.mjs

      - name: Upload packaged extension
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: extension/release/*.zip
          retention-days: 30

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: extension/playwright-report
          retention-days: 7

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (coverage)
        run: python -m pytest -q --cov --cov-report=term-missing

  integration:
    name: Integration (Docker — extension ↔ backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dockerized integration E2E
        run: |
          docker compose -f integration/docker-compose.yml up --build \
            --abort-on-container-exit --exit-code-from e2e
